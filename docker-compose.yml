services:
  web:
    build: 
      context: .
      dockerfile: apps/web/Dockerfile
      target: builder
    command: npm run dev --workspace=@chaintrigger/web
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/worker/node_modules
      - /app/packages/shared/node_modules
      - /app/apps/web/.next
    ports:
      - "3000:3000"
    env_file:
      - ./apps/web/.env
    depends_on:
      - redis
      - mongodb
    networks:
      - chaintrigger-network
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      target: builder
    command: npm run dev --workspace=@chaintrigger/worker
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/worker/node_modules
      - /app/packages/shared/node_modules
    env_file:
      - ./apps/worker/.env
    depends_on:
      - redis
      - mongodb
    networks:
      - chaintrigger-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - chaintrigger-network
    restart: unless-stopped

  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - chaintrigger-network
    restart: unless-stopped

networks:
  chaintrigger-network:
    driver: bridge

volumes:
  redis_data:
  mongodb_data:
